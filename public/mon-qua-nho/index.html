<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Món Quà Nhỏ" />
  <meta name="theme-color" content="#1b0a1c" />
  <link rel="apple-touch-icon" href="assets/images/couple.svg" />
  <link rel="icon" type="image/svg+xml" href="assets/images/couple.svg" />
  <title>Món Quà Nhỏ</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@400;500;600;700&family=Pacifico&display=swap" />

  <!-- App Styles -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/passcode.css" />
  <link rel="stylesheet" href="assets/css/letter.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       PASSCODE SCREEN
  ════════════════════════════════════════════ -->
  <div id="passcodeScreen">
    <div class="passcode-bears" id="passcodeBears">
      <img src="assets/images/bearwait.svg" alt="" class="passcode-bear left pos-0" id="bearLeft" />
      <img src="assets/images/bearflower.svg" alt="" class="passcode-bear right pos-0" id="bearRight" />
      <img src="assets/images/couple.svg" alt="" class="passcode-couple-img" id="coupleImg" />
    </div>
    <div class="hearts-passcode">
      <span class="heart-fly">💕</span>
      <span class="heart-fly">❤️</span>
      <span class="heart-fly">💗</span>
      <span class="heart-fly">💖</span>
      <span class="heart-fly">💕</span>
      <span class="heart-fly">❤️</span>
      <span class="heart-fly">💗</span>
      <span class="heart-fly">💖</span>
      <span class="heart-fly">💕</span>
      <span class="heart-fly">❤️</span>
    </div>
    <div class="passcode-title">Nhập mật khẩu</div>
    <div class="passcode-subtitle">Mở món quà đặc biệt</div>
    <div class="passcode-dots" id="passcodeDots">
      <div class="passcode-dot" data-i="0"></div>
      <div class="passcode-dot" data-i="1"></div>
      <div class="passcode-dot" data-i="2"></div>
      <div class="passcode-dot" data-i="3"></div>
    </div>
    <div class="passcode-keypad">
      <button type="button" class="passcode-btn" data-num="1">1</button>
      <button type="button" class="passcode-btn" data-num="2">2</button>
      <button type="button" class="passcode-btn" data-num="3">3</button>
      <button type="button" class="passcode-btn" data-num="4">4</button>
      <button type="button" class="passcode-btn" data-num="5">5</button>
      <button type="button" class="passcode-btn" data-num="6">6</button>
      <button type="button" class="passcode-btn" data-num="7">7</button>
      <button type="button" class="passcode-btn" data-num="8">8</button>
      <button type="button" class="passcode-btn" data-num="9">9</button>
      <button type="button" class="passcode-btn empty"></button>
      <button type="button" class="passcode-btn" data-num="0">0</button>
      <button type="button" class="passcode-btn empty"></button>
    </div>
    <button type="button" class="passcode-cancel" id="passcodeCancel">Hủy</button>
  </div>

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN
  ════════════════════════════════════════════ -->
  <div id="loading">
    <span>Đang tải...</span>
    <div id="progress-container">
      <div id="progress"></div>
    </div>
  </div>

  <!-- UI info -->
  <div id="ui" style="display:none">
    <div id="info"></div>
  </div>

  <!-- Start button (hold to begin) -->
  <div id="start-wrap">
    <div id="start-label">Giữ để bắt đầu</div>
    <svg viewBox="0 0 68 68">
      <circle class="ring-pulse" cx="34" cy="34" r="28"></circle>
      <circle class="ring-track" cx="34" cy="34" r="26"></circle>
      <circle class="ring-fill" id="ring-fill" cx="34" cy="34" r="26"></circle>
    </svg>
  </div>

  <!-- Transition overlay (fade to black between phases) -->
  <div id="transition-overlay"></div>

  <!-- Sphere click hint -->
  <div id="sphere-click-hint" aria-hidden="true">Click vào nhé</div>

  <!-- Flying images button (corner) -->
  <button type="button" id="btn-flying-corner" aria-label="Ảnh bay lên">💌</button>

  <!-- Sphere particles CSS background -->
  <div id="sphere-particles-bg"></div>

  <!-- ═══════════════════════════════════════════
       CUPID LETTER OVERLAY
  ════════════════════════════════════════════ -->
  <div id="cupid-letter-overlay">
    <div class="cupid-space"></div>
    <img id="cupid-flying-img" src="assets/images/cupidletter.svg" alt="Cupid" />
    <img id="letter-envelope-img" src="assets/images/letterimage.svg" alt="Phong bì" />

    <div id="cupid-letter-frame">
      <div class="letter-butterfly-left">
        <img src="assets/images/buomtrai.svg" alt="" />
      </div>
      <div class="letter-butterfly-right">
        <img src="assets/images/buomphai.svg" alt="" />
      </div>
      <div class="letter-bottom-bg"></div>
      <div class="letter-content"></div>
      <div class="letter-image-wrap" id="letterImageWrap" style="display:none">
        <img class="letter-inline-image" id="letterInlineImage" src="" alt="" />
        <span class="letter-image-caption">♥</span>
      </div>
    </div>
  </div>

  <!-- WebGL Canvas -->
  <canvas id="webglCanvas"></canvas>

  <!-- ═══════════════════════════════════════════
       APP CONFIG — Chỉnh sửa tại đây
  ════════════════════════════════════════════ -->
  <script src="/mon-qua-nho/config.js"></script>

  <!-- Three.js import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
        "simplex-noise": "https://cdn.skypack.dev/simplex-noise@4.0.1"
      }
    }
  </script>

  <!-- App scripts (order matters) -->
  <script src="assets/js/passcode.js"></script>
  <script src="assets/js/music.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
