<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" width="260" height="180">
  <defs>
    <linearGradient id="envBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f5"/>
      <stop offset="100%" style="stop-color:#ffd1dc"/>
    </linearGradient>
    <linearGradient id="envFlap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8a4c0"/>
      <stop offset="100%" style="stop-color:#e87fa8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#c0507080" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Envelope body -->
  <rect x="10" y="50" width="240" height="120" rx="10" ry="10" fill="url(#envBody)" stroke="#e87fa8" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Envelope bottom fold lines -->
  <line x1="10" y1="170" x2="130" y2="110" stroke="#f0a0c0" stroke-width="1"/>
  <line x1="250" y1="170" x2="130" y2="110" stroke="#f0a0c0" stroke-width="1"/>
  <!-- Envelope flap (open) -->
  <path d="M10,50 L130,115 L250,50 Z" fill="url(#envFlap)" stroke="#e87fa8" stroke-width="1.5"/>
  <!-- Heart seal -->
  <g transform="translate(130,80)">
    <path d="M0,-12 C0,-20 -14,-20 -14,-10 C-14,0 0,12 0,12 C0,12 14,0 14,-10 C14,-20 0,-20 0,-12 Z" fill="#e8507a" opacity="0.9"/>
  </g>
  <!-- Decorative dots on envelope -->
  <circle cx="40" cy="140" r="3" fill="#f5a0c0" opacity="0.6"/>
  <circle cx="220" cy="140" r="3" fill="#f5a0c0" opacity="0.6"/>
  <circle cx="40" cy="80" r="2" fill="#f5a0c0" opacity="0.4"/>
  <circle cx="220" cy="80" r="2" fill="#f5a0c0" opacity="0.4"/>
</svg>
