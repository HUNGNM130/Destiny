<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" width="160" height="140">
  <defs>
    <linearGradient id="wing1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9ec7"/>
      <stop offset="50%" style="stop-color:#ff6fa8"/>
      <stop offset="100%" style="stop-color:#ff4f99"/>
    </linearGradient>
    <linearGradient id="wing2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb8d8"/>
      <stop offset="100%" style="stop-color:#ff80bb"/>
    </linearGradient>
  </defs>
  <!-- Upper left wing -->
  <path d="M80,70 Q30,20 15,45 Q5,65 40,75 Q60,80 80,70 Z" fill="url(#wing1)" opacity="0.9" stroke="#d4408a" stroke-width="0.8"/>
  <!-- Lower left wing -->
  <path d="M80,75 Q35,80 25,105 Q20,125 55,115 Q72,105 80,85 Z" fill="url(#wing2)" opacity="0.85" stroke="#d4408a" stroke-width="0.8"/>
  <!-- Upper right wing -->
  <path d="M80,70 Q130,20 145,45 Q155,65 120,75 Q100,80 80,70 Z" fill="url(#wing1)" opacity="0.9" stroke="#d4408a" stroke-width="0.8"/>
  <!-- Lower right wing -->
  <path d="M80,75 Q125,80 135,105 Q140,125 105,115 Q88,105 80,85 Z" fill="url(#wing2)" opacity="0.85" stroke="#d4408a" stroke-width="0.8"/>
  <!-- Wing patterns -->
  <circle cx="50" cy="52" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="110" cy="52" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="45" cy="100" r="5" fill="#ffffff" opacity="0.25"/>
  <circle cx="115" cy="100" r="5" fill="#ffffff" opacity="0.25"/>
  <!-- Body -->
  <ellipse cx="80" cy="78" rx="5" ry="22" fill="#8b2060"/>
  <!-- Antennae -->
  <path d="M78,58 Q60,35 55,28" stroke="#8b2060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="55" cy="28" r="3" fill="#ff4f99"/>
  <path d="M82,58 Q100,35 105,28" stroke="#8b2060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="105" cy="28" r="3" fill="#ff4f99"/>
</svg>
