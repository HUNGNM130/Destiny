    <path d="M0,-14 C0,-24 -17,-24 -17,-12 C-17,0 0,15 0,15 C0,15 17,0 17,-12 C17,-24 0,-24 0,-14 Z" fill="#ff4070" opacity="0.85"/>
  </g>
  <!-- Sparkles -->
  <text x="22" y="45" font-size="16">✨</text>
  <text x="158" y="45" font-size="14">✨</text>
  <text x="90" y="175" font-size="12">💕</text>
