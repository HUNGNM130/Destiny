  <!-- Girl smile -->
  <path d="M61,85 Q68,91 75,85" stroke="#c05060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Girl body -->
  <path d="M44,145 Q44,100 68,100 Q92,100 92,145 Z" fill="#ff80aa"/>
  <!-- Boy (right) -->
  <!-- Boy hair -->
  <ellipse cx="132" cy="70" rx="26" ry="22" fill="#3a2200"/>
  <!-- Boy head -->
  <circle cx="132" cy="78" r="24" fill="url(#skin2)"/>
  <!-- Boy eyes -->
  <ellipse cx="124" cy="76" rx="4" ry="4" fill="#2a1a0a"/>
  <ellipse cx="140" cy="76" rx="4" ry="4" fill="#2a1a0a"/>
  <circle cx="125" cy="74" r="1.5" fill="white"/>
  <circle cx="141" cy="74" r="1.5" fill="white"/>
  <!-- Boy blush -->
  <ellipse cx="119" cy="83" rx="6" ry="3.5" fill="#f08060" opacity="0.35"/>
  <ellipse cx="145" cy="83" rx="6" ry="3.5" fill="#f08060" opacity="0.35"/>
  <!-- Boy smile -->
  <path d="M125,87 Q132,93 139,87" stroke="#a04030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Boy body -->
