<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd1dc"/>
      <stop offset="100%" style="stop-color:#ffb6c1"/>
    </linearGradient>
    <linearGradient id="skin1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fddbb0"/>
      <stop offset="100%" style="stop-color:#f0c090"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcc8a0"/>
      <stop offset="100%" style="stop-color:#e8a878"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <!-- Girl (left) -->
  <!-- Girl hair -->
  <ellipse cx="68" cy="72" rx="28" ry="32" fill="#4a2800"/>
  <path d="M42,80 Q38,110 44,130" stroke="#4a2800" stroke-width="8" fill="none"/>
  <path d="M94,80 Q98,110 94,130" stroke="#4a2800" stroke-width="8" fill="none"/>
  <!-- Girl head -->
  <circle cx="68" cy="76" r="24" fill="url(#skin1)"/>
  <!-- Girl eyes -->
  <ellipse cx="60" cy="74" rx="4" ry="4.5" fill="#2a1a0a"/>
  <ellipse cx="76" cy="74" rx="4" ry="4.5" fill="#2a1a0a"/>
  <circle cx="61" cy="72" r="1.5" fill="white"/>
  <circle cx="77" cy="72" r="1.5" fill="white"/>
  <!-- Girl blush -->
