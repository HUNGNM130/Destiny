services:
  - type: web
    name: love-diary
    runtime: node
    buildCommand: npm config set registry https://registry.npmjs.org/ && npm install --registry=https://registry.npmjs.org/ && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_REGISTRY
        value: https://registry.npmjs.org/
      - key: DATABASE_URL
        sync: false          # Điền trên Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_PIN
        sync: false          # Mã PIN bí mật để vào Dashboard (mặc định: 1234)
